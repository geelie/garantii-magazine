<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Garanții Geeli</title>
    <link
      rel="icon"
      type="image/png"
      href="https://i.ibb.co/3DK9gMM/20260302-184545.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .a4-page {
        width: 100%;
        max-width: 210mm;
        min-height: 297mm;
        padding: 10mm;
        margin: auto;
        background: white;
        color: black;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      #main-nav::-webkit-scrollbar {
        height: 4px;
      }

      #main-nav::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      @media print {
        .no-print {
          display: none !important;
        }

        body {
          background: white !important;
          margin: 0;
          padding: 0;
        }

        #modal-view {
          position: absolute;
          top: 0;
          left: 0;
          background: white !important;
          display: block !important;
          overflow: visible !important;
          width: 100%;
        }

        .a4-page {
          box-shadow: none;
          margin: 0;
          border: none;
          width: 210mm;
          height: 296mm;
          padding: 8mm !important;
          overflow: hidden;
        }

        #app-section,
        #auth-section {
          display: none !important;
        }

        #v-render-area {
          height: 100%;
          display: flex;
          flex-direction: column;
        }
      }

      @media (max-width: 640px) {
        .a4-page {
          padding: 5mm;
          min-height: auto;
        }

        h1 {
          font-size: 1.25rem !important;
        }

        .mobile-grid-cols {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
  </head>

  <body class="bg-slate-900 text-slate-100">
    <!-- AUTH SECTION -->
    <div
      id="auth-section"
      class="min-h-screen flex items-center justify-center p-4 no-print"
    >
      <div
        class="bg-white text-slate-900 p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600"
      >
        <h2
          class="text-2xl md:text-3xl font-black mb-6 text-center italic text-blue-600 tracking-tighter uppercase"
        >
          Geeli Garantii
        </h2>

        <div id="login-form" class="space-y-4">
          <input
            type="text"
            id="l-user"
            placeholder="Utilizator"
            class="w-full p-3 border-2 border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-semibold"
          />
          <input
            type="password"
            id="l-pass"
            placeholder="Parolă"
            class="w-full p-3 border-2 border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-semibold"
          />
          <div class="flex items-center gap-2 px-1">
            <input
              type="checkbox"
              id="l-remember"
              class="w-5 h-5 cursor-pointer"
            />
            <label
              for="l-remember"
              class="text-sm font-bold text-slate-600 cursor-pointer select-none"
              >Salvează parola</label
            >
          </div>
          <button
            onclick="handleLogin()"
            class="w-full bg-blue-600 text-white p-4 rounded-xl font-black hover:bg-blue-700 transition tracking-wide active:scale-95"
          >
            CONECTARE
          </button>
          <div class="flex justify-end pt-2">
            <button
              onclick="showAuth('reset')"
              class="text-slate-500 text-sm font-bold hover:underline"
            >
              Resetare parolă
            </button>
          </div>
        </div>

        <div id="reset-form" class="hidden space-y-4">
          <h3
            class="text-center font-black text-slate-700 uppercase text-sm mb-2"
          >
            Schimbare Parolă
          </h3>
          <input
            type="text"
            id="reset-user"
            placeholder="Utilizator"
            class="w-full p-3 border-2 border-slate-300 rounded-lg font-semibold"
          />
          <input
            type="password"
            id="reset-old-pass"
            placeholder="Parolă Veche"
            class="w-full p-3 border-2 border-slate-300 rounded-lg font-semibold"
          />
          <input
            type="password"
            id="reset-new-pass"
            placeholder="Parolă Nouă"
            class="w-full p-3 border-2 border-slate-300 rounded-lg font-semibold"
          />
          <button
            onclick="handleResetPassword()"
            class="w-full bg-orange-600 text-white p-4 rounded-xl font-black uppercase hover:bg-orange-700 transition active:scale-95"
          >
            Actualizează Parola
          </button>
          <button
            onclick="showAuth('login')"
            class="w-full text-sm text-slate-500 font-bold mt-2"
          >
            Înapoi
          </button>
        </div>
      </div>
    </div>

    <!-- APP SECTION -->
    <div
      id="app-section"
      class="hidden min-h-screen flex flex-col bg-slate-100 text-slate-900 no-print"
    >
      <nav
        class="bg-slate-800 text-white p-0 flex justify-between items-center shadow-lg sticky top-0 z-40 h-12"
      >
        <img
          src="https://i.ibb.co/6cM58dZH/20260302-184450.png"
          alt="Logo"
          class="h-8 md:h-12 object-contain ml-2"
        />
        <div class="flex items-center gap-3">
          <div class="text-right leading-none flex flex-col justify-center">
            <p
              id="nav-user-name"
              class="font-extrabold text-[10px] md:text-sm"
            ></p>
            <p
              id="nav-user-info"
              class="text-[8px] md:text-[10px] text-blue-400 font-black uppercase tracking-widest"
            ></p>
          </div>
          <button
            onclick="handleLogout()"
            class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-lg font-black text-[10px] md:text-xs transition"
          >
            IEȘIRE
          </button>
        </div>
      </nav>

      <div
        class="bg-white border-b-2 flex overflow-x-auto sticky top-12 z-30 shadow-sm no-scrollbar"
        id="main-nav"
      >
        <button
          onclick="switchTab('tab-list')"
          id="btn-list"
          class="flex-shrink-0 px-6 md:px-8 py-4 font-black border-b-4 border-blue-600 text-blue-600 text-sm md:text-base"
        >
          LISTĂ FIȘE
        </button>
        <button
          onclick="switchTab('tab-add')"
          id="btn-add"
          class="hidden flex-shrink-0 px-6 md:px-8 py-4 font-black text-slate-500 hover:text-blue-600 transition text-sm md:text-base"
        >
          ADĂUGARE FIȘE
        </button>
      </div>

      <main class="flex-grow p-3 md:p-8">
        <!-- TAB LISTA FISE -->
        <div id="tab-list" class="tab-content active">
          <!-- Export Excel -->
          <div
            class="bg-white p-4 rounded-xl mb-6 border-2 border-blue-100 shadow-sm flex flex-col md:flex-row items-start md:items-center gap-4"
          >
            <div class="flex items-center gap-2 w-full md:w-auto">
              <span class="text-[10px] font-black uppercase text-blue-700"
                >Export Excel:</span
              >
              <select
                id="export-type"
                class="flex-grow md:flex-grow-0 p-2 border rounded font-bold text-xs bg-slate-50 outline-none"
                onchange="toggleExportDates()"
              >
                <option value="all">Toate Fișele Mele</option>
                <option value="current">Afișate acum (Filtrate)</option>
                <option value="period">Perioadă Specifică</option>
              </select>
            </div>
            <div
              id="export-dates"
              class="hidden flex items-center gap-2 w-full md:w-auto"
            >
              <input
                type="date"
                id="exp-start"
                class="flex-grow p-2 border rounded font-bold text-xs"
              />
              <span class="text-xs font-bold">-</span>
              <input
                type="date"
                id="exp-end"
                class="flex-grow p-2 border rounded font-bold text-xs"
              />
            </div>
            <button
              onclick="exportToExcel()"
              class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-black text-xs uppercase transition flex items-center justify-center gap-2 active:scale-95"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                ></path>
              </svg>
              Export Excel
            </button>
          </div>

          <div class="flex gap-2 mb-6 items-center">
            <input
              type="text"
              id="search-box"
              onkeyup="filterTable()"
              placeholder="Caută după nume, VIN, telefon..."
              class="flex-grow min-w-0 p-3 md:p-4 border-2 border-slate-300 rounded-xl shadow-sm outline-none font-semibold focus:border-blue-500 transition text-sm md:text-base"
            />
            <select
              id="status-filter"
              onchange="handleStatusChange()"
              class="p-2 md:p-3 border-2 border-slate-200 rounded-lg font-bold text-xs md:text-sm bg-white text-slate-700 outline-none focus:border-blue-500 transition-all"
            >
              <option value="Toate">Toate Statusurile</option>
              <option value="În lucru">În lucru</option>
              <option value="Finalizat">Finalizat</option>
              <option value="Revenire">Revenire</option>
            </select>
            <select
              onchange="changePageSize(this.value)"
              class="flex-shrink-0 w-20 md:w-auto p-2 md:p-4 border-2 border-slate-300 rounded-xl font-black text-xs md:text-sm bg-white outline-none focus:border-blue-500 transition no-print"
            >
              <option value="25">25 fișe/pag.</option>
              <option value="50" selected>50 fișe/pag.</option>
              <option value="75">75 fișe/pag.</option>
              <option value="100">100 fișe/pag.</option>
            </select>
          </div>

          <div
            class="bg-white rounded-2xl shadow-xl overflow-x-auto border border-slate-200"
          >
            <table class="w-full text-left min-w-[700px]">
              <thead
                class="bg-slate-200 text-slate-800 uppercase text-[10px] font-black tracking-widest"
              >
                <tr>
                  <th class="p-4 border-r border-slate-400">#</th>
                  <th class="p-4 border-r border-slate-400">ID Fișă</th>
                  <th class="p-4 border-r border-slate-400">
                    Client / Telefon / Județ
                  </th>
                  <th class="p-4 border-r border-slate-400">Produs / VIN</th>
                  <th class="p-4 border-r border-slate-400">Vechime</th>
                  <th class="p-4">Status</th>
                </tr>
              </thead>
              <tbody
                id="fise-rows"
                class="divide-y divide-slate-200 hover:[&>tr]:bg-blue-50 cursor-pointer text-sm"
              ></tbody>
            </table>
          </div>
        </div>

        <!-- TAB ADAUGARE FISE -->
        <div id="tab-add" class="tab-content max-w-6xl mx-auto">
          <form
            id="form-fisa-noua"
            class="bg-white p-5 md:p-8 rounded-2xl shadow-2xl grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 border border-slate-200"
          >
            <!-- Coloana 1: Date Client -->
            <div class="space-y-4">
              <h3
                class="font-black text-blue-700 border-b-2 border-blue-100 pb-2 uppercase text-[10px] italic tracking-wider"
              >
                1. Date Client
              </h3>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >Nume Prenume</label
                >
                <input
                  type="text"
                  id="c-nume"
                  placeholder="Nume Prenume"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm"
                  required
                />
              </div>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >Număr telefon</label
                >
                <input
                  type="text"
                  id="c-tel"
                  placeholder="Nr. Telefon"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm"
                />
              </div>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >E-mail</label
                >
                <input
                  type="email"
                  id="c-email"
                  placeholder="Email"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm"
                />
              </div>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >Adresa domiciliu</label
                >
                <input
                  type="text"
                  id="c-adr"
                  placeholder="Adresa domiciliu"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm"
                />
              </div>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >Județ</label
                >
                <select
                  id="c-judet"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm bg-white"
                >
                  <option value="">Selectează Județ</option>
                  <option value="Alba">Alba</option>
                  <option value="Arad">Arad</option>
                  <option value="Arges">Argeș</option>
                  <option value="Bacau">Bacău</option>
                  <option value="Bihor">Bihor</option>
                  <option value="Bistrita-Nasaud">Bistrița-Năsăud</option>
                  <option value="Botosani">Botoșani</option>
                  <option value="Brasov">Brașov</option>
                  <option value="Braila">Brăila</option>
                  <option value="Bucuresti">București</option>
                  <option value="Buzau">Buzău</option>
                  <option value="Caras-Severin">Caraș-Severin</option>
                  <option value="Calarasi">Călărași</option>
                  <option value="Cluj">Cluj</option>
                  <option value="Constanta">Constanța</option>
                  <option value="Covasna">Covasna</option>
                  <option value="Dambovita">Dâmbovița</option>
                  <option value="Dolj">Dolj</option>
                  <option value="Galati">Galați</option>
                  <option value="Giurgiu">Giurgiu</option>
                  <option value="Gorj">Gorj</option>
                  <option value="Harghita">Harghita</option>
                  <option value="Hunedoara">Hunedoara</option>
                  <option value="Ialomita">Ialomița</option>
                  <option value="Iasi">Iași</option>
                  <option value="Ilfov">Ilfov</option>
                  <option value="Maramures">Maramureș</option>
                  <option value="Mehedinti">Mehedinți</option>
                  <option value="Mures">Mureș</option>
                  <option value="Neamt">Neamț</option>
                  <option value="Olt">Olt</option>
                  <option value="Prahova">Prahova</option>
                  <option value="Satu Mare">Satu Mare</option>
                  <option value="Salaj">Sălaj</option>
                  <option value="Sibiu">Sibiu</option>
                  <option value="Suceava">Suceava</option>
                  <option value="Teleorman">Teleorman</option>
                  <option value="Timis">Timiș</option>
                  <option value="Tulcea">Tulcea</option>
                  <option value="Vaslui">Vaslui</option>
                  <option value="Valcea">Vâlcea</option>
                  <option value="Vrancea">Vrancea</option>
                </select>
              </div>
              <div>
                <label
                  class="text-[9px] font-black text-slate-800 uppercase ml-1"
                  >Data Înregistrare</label
                >
                <input
                  type="datetime-local"
                  id="c-data-auto"
                  class="w-full p-3 border-2 border-slate-200 rounded-lg bg-slate-50 font-bold text-sm"
                />
              </div>
            </div>

            <!-- Coloana 2: Date Produs -->
            <div class="space-y-4">
              <h3
                class="font-black text-blue-700 border-b-2 border-blue-100 pb-2 uppercase text-[10px] italic tracking-wider"
              >
                2. Date Produs
              </h3>
              <div class="space-y-2">
                <div>
                  <label
                    class="text-[9px] font-black text-slate-800 uppercase ml-1"
                    >Categorie Produs</label
                  >
                  <select
                    id="p-cat"
                    onchange="updateModelOptions()"
                    class="w-full p-3 border-2 border-slate-200 rounded-lg text-sm font-black bg-slate-50"
                  >
                    <option value="" disabled selected>Selectați...</option>
                    <option value="Bicicleta electrica">
                      Bicicletă Electrică
                    </option>
                    <option value="Tricicleta electrica">
                      Tricicletă Electrică
                    </option>
                    <option value="Scuter electric">Scuter Electric</option>
                    <option value="Cvadraciclu electric">
                      Cvadraciclu Electric
                    </option>
                    <option value="Alta">Alta (Specificați mai jos)</option>
                  </select>
                  <input
                    type="text"
                    id="p-cat-alt"
                    placeholder="Introduceți categoria..."
                    class="hidden mt-2 w-full p-3 border-2 border-blue-400 rounded-lg font-bold bg-blue-50 text-blue-900 text-sm"
                  />
                </div>
                <div>
                  <label
                    class="text-[9px] font-black text-slate-800 uppercase ml-1"
                    >Serie VIN</label
                  >
                  <input
                    type="text"
                    id="p-vin"
                    placeholder="Serie VIN"
                    class="w-full p-3 border-2 border-slate-200 rounded-lg font-mono font-black uppercase text-blue-800 text-sm"
                  />
                </div>
                <div id="p-mod-container">
                  <label
                    class="text-[9px] font-black text-slate-800 uppercase ml-1"
                    >Marcă / Model</label
                  >
                  <div id="p-mod-wrapper">
                    <input
                      type="text"
                      id="p-mod"
                      placeholder="Marcă / Model"
                      class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm"
                    />
                  </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-2">
                  <div>
                    <label
                      class="text-[9px] font-black text-slate-800 uppercase ml-1"
                      >Emitent / Nr. Factură / Data Fact.</label
                    >
                    <input
                      type="text"
                      id="p-fact"
                      placeholder="Emitent/Factură"
                      class="w-full sm:w-[99%] p-3 border-2 border-slate-200 rounded-lg text-xs font-bold"
                    />
                  </div>
                  <input
                    type="date"
                    id="p-dfact"
                    class="w-full sm:w-[45%] p-3 border-2 border-slate-200 rounded-lg text-xs font-bold"
                  />
                </div>
                <div>
                  <label
                    class="text-[9px] font-black text-slate-800 uppercase ml-1"
                    >Stare</label
                  >
                  <select
                    id="p-gar"
                    class="w-full p-3 border-2 border-slate-200 rounded-lg text-sm font-bold"
                  >
                    <option value="In garantie">În Garanție</option>
                    <option value="Post garantie">Post Garanție</option>
                  </select>
                </div>
                <div>
                  <label
                    class="text-[9px] font-black text-slate-800 uppercase ml-1"
                    >Observații</label
                  >
                  <input
                    type="text"
                    id="p-obs-produs"
                    placeholder="Observații (Accesorii, starea etc.)"
                    class="w-full p-3 border-2 border-slate-200 rounded-lg text-xs font-semibold"
                  />
                </div>
              </div>
            </div>

            <!-- Coloana 3: Reclamatie + Submit -->
            <div class="space-y-4">
              <h3
                class="font-black text-blue-700 border-b-2 border-blue-100 pb-2 uppercase text-[10px] italic tracking-wider"
              >
                3. Reclamație Client
              </h3>
              <textarea
                id="p-rec"
                placeholder="Introduceți defectele sesizate..."
                class="w-full p-3 border-2 border-slate-200 rounded-lg h-32 md:h-48 outline-none font-semibold focus:border-blue-500 text-sm"
                required
              ></textarea>
              <button
                type="submit"
                id="submit-btn"
                class="w-full bg-blue-600 text-white p-4 md:p-5 rounded-2xl font-black text-base md:text-lg hover:bg-blue-700 uppercase shadow-lg transition active:scale-95"
              >
                Salvează Fișa
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- MODAL VIEW -->
    <div
      id="modal-view"
      class="fixed inset-0 bg-black/90 hidden z-50 overflow-y-auto p-2 md:p-4"
    >
      <div
        class="max-w-[210mm] mx-auto mb-4 flex flex-wrap gap-2 justify-between items-center bg-slate-800 p-3 rounded-xl no-print"
      >
        <div class="flex flex-wrap gap-2">
          <button
            onclick="window.print()"
            class="bg-blue-600 text-white px-4 md:px-6 py-2 rounded-lg font-black text-[10px] uppercase shadow-xl hover:bg-blue-500 active:scale-95"
          >
            PRINT / PDF
          </button>
        </div>
        <button
          onclick="closeModal()"
          class="bg-slate-700 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase"
        >
          Închide
        </button>
      </div>
      <div id="a4-content" class="a4-page rounded-sm overflow-hidden">
        <div id="v-render-area" class="h-full flex flex-col"></div>
      </div>
    </div>

    <script>
      const SUPA_URL = "https://chsuqecaqhnjqmmuwfhl.supabase.co";
      const SUPA_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoc3VxZWNhcWhuanFtbXV3ZmhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDQ4NDMsImV4cCI6MjA4ODAyMDg0M30.CRMlqol-pl3DSBSBvpm04PLkSjE9lja3c1JnKnLrWvs";
      const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

      let activeUser = null;
      let currentFisa = null;

      // -----------------------------------------------
      // UTILITĂȚI
      // -----------------------------------------------
      function getRoTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function formatRelativ(dateStr) {
        if (!dateStr) return "Recent";
        const dataModificarii = new Date(dateStr);
        const acum = new Date();
        const difSecunde = Math.floor((acum - dataModificarii) / 1000);
        if (difSecunde < 60) return "Chiar acum";
        const minute = Math.floor(difSecunde / 60);
        if (minute < 60) return `Acum ${minute}m`;
        const ore = Math.floor(minute / 60);
        if (ore < 24) return `Acum ${ore}h`;
        return dataModificarii.toLocaleDateString("ro-RO", {
          day: "2-digit",
          month: "2-digit",
        });
      }

      async function handleLogin(storedU = null, storedP = null) {
        const u = (storedU || document.getElementById("l-user").value).trim();
        const p = (storedP || document.getElementById("l-pass").value).trim();
        const remember = document.getElementById("l-remember").checked;
        if (!u || !p) return;

        const { data } = await _supa
          .from("profiles")
          .select("*")
          .ilike("username", u)
          .eq("password", p)
          .maybeSingle();
        if (data) {
          activeUser = data;
          if (remember)
            localStorage.setItem("geeli_session", JSON.stringify({ u, p }));
          document.getElementById("auth-section").classList.add("hidden");
          document.getElementById("app-section").classList.remove("hidden");
          document.getElementById("nav-user-name").innerText =
            data.nume_complet;
          document.getElementById("nav-user-info").innerText =
            `${data.service}`;

          // Tab Adaugare: vizibil pentru useri cu rol user/magazin
          if (data.rol === "user" || data.rol === "magazin") {
            document.getElementById("btn-add").classList.remove("hidden");
          }

          document.getElementById("c-data-auto").value = getRoTime();
          loadFise();
        } else {
          if (!storedU) alert("Date incorecte!");
          else localStorage.removeItem("geeli_session");
        }
      }

        if (!u || !oldP || !newP) return alert("Completați toate datele!");
        const { data: profile } = await _supa
          .from("profiles")
          .select("id")
          .ilike("username", u)
          .eq("password", oldP)
          .maybeSingle();
        if (profile) {
          await _supa
            .from("profiles")
            .update({ password: newP })
            .eq("id", profile.id);

      function renderPagination(current, total, totalItems) {
        let container = document.getElementById("pagination-bar");
        if (!container) {
          const tableWrapper = document.querySelector(
            ".bg-white.rounded-2xl.shadow-xl.overflow-x-auto",
          );
          container = document.createElement("div");
          container.id = "pagination-bar";
          tableWrapper.after(container);
        }

        if (total <= 1 && totalItems <= ITEMS_PER_PAGE) {
          container.innerHTML = "";
          return;
        }

        const start = (current - 1) * ITEMS_PER_PAGE + 1;
        const end = Math.min(current * ITEMS_PER_PAGE, totalItems);

        let pages = [];
        if (total <= 7) {
          for (let i = 1; i <= total; i++) pages.push(i);
        } else {
          pages.push(1);
          if (current > 3) pages.push("...");
          for (
            let i = Math.max(2, current - 1);
            i <= Math.min(total - 1, current + 1);
            i++
          )
            pages.push(i);
          if (current < total - 2) pages.push("...");
          pages.push(total);
        }

        container.className =
          "flex flex-wrap items-center justify-between gap-3 mt-4 px-2 py-3 no-print";
        container.innerHTML = `
                <span class="text-xs font-bold text-slate-500">
                    Afișate <b>${start}–${end}</b> din <b>${totalItems}</b> fișe &nbsp;|&nbsp; Pagina <b>${current}</b> din <b>${total}</b>
                </span>
                <div class="flex flex-wrap gap-1">
                    <button onclick="loadFise(${current - 1})" ${current === 1 ? "disabled" : ""}
                        class="px-3 py-1.5 rounded-lg text-xs font-black border-2 ${current === 1 ? "border-slate-200 text-slate-300 cursor-not-allowed" : "border-slate-300 text-slate-600 hover:bg-slate-100 transition"}">
                        ← Prev
                    </button>
                    ${pages
                      .map((p) =>
                        p === "..."
                          ? `<span class="px-2 py-1.5 text-xs text-slate-400 font-bold self-center">…</span>`
                          : `<button onclick="loadFise(${p})"
                            class="px-3 py-1.5 rounded-lg text-xs font-black border-2 transition ${
                              p === current
                                ? "bg-blue-600 border-blue-600 text-white shadow"
                                : "border-slate-300 text-slate-600 hover:bg-blue-50 hover:border-blue-300"
                            }">${p}</button>`,
                      )
                      .join("")}
                    <button onclick="loadFise(${current + 1})" ${current === total ? "disabled" : ""}
                        class="px-3 py-1.5 rounded-lg text-xs font-black border-2 ${current === total ? "border-slate-200 text-slate-300 cursor-not-allowed" : "border-slate-300 text-slate-600 hover:bg-slate-100 transition"}">
                        Next →
                    </button>
                </div>`;
      }

      function buildBaseQuery(forCount = false) {
        const q = currentSearchQuery.trim().toLowerCase();

        let query = _supa
          .from("fise_cu_vechime")
          .select(forCount ? "*" : "*", { count: "exact", head: forCount })
          .eq("is_deleted", false)
          .eq("magazin", activeUser.service);

        if (currentStatusFilter !== "Toate") {
          query = query.eq("status", currentStatusFilter);
        }

        if (q) {
          query = query.or(
            [
              `nume_client.ilike.%${q}%`,
              `vin_produs.ilike.%${q}%`,
              `tel_client.ilike.%${q}%`,
              `marca_model.ilike.%${q}%`,
              `id.ilike.%${q}%`,
              `judet_client.ilike.%${q}%`,
              `email_client.ilike.%${q}%`,
              `status.ilike.%${q}%`,
              `vechime_status.ilike.%${q}%`,
            ].join(","),
          );
        }

        return query;
      }

      async function loadFise(page = 1) {
        if (activeUser.rol === "none") {
          document.getElementById("fise-rows").innerHTML =
            '<tr><td colspan="6" class="p-10 text-center font-black text-red-600 uppercase">Cont neactivat. Contactați administratorul.</td></tr>';
          return;
        }

        currentPage = page;

        const { count: filteredCount } = await buildBaseQuery(true);
        totalFilteredCount = filteredCount || 0;

        const totalPages = Math.max(
          1,
          Math.ceil(totalFilteredCount / ITEMS_PER_PAGE),
        );
        if (page > totalPages) page = currentPage = totalPages;

        const offset = (page - 1) * ITEMS_PER_PAGE;

        const { data, error } = await buildBaseQuery(false)
          .order("updated_at", { ascending: false })
          .range(offset, offset + ITEMS_PER_PAGE - 1);

        if (error) {
          console.error("Eroare loadFise:", error);
          return;
        }

        const body = document.getElementById("fise-rows");
        body.innerHTML = "";

        if (!data || data.length === 0) {
          body.innerHTML =
            '<tr><td colspan="6" class="p-10 text-center font-black text-slate-400 italic">Nu există fișe.</td></tr>';
          renderPagination(1, 1, 0);
          return;
        }

        data.forEach((f, i) => {
          const globalNrCrt = totalFilteredCount - offset - i;
          body.innerHTML += buildRow(f, globalNrCrt);
        });

        renderPagination(page, totalPages, totalFilteredCount);
      }

      // -----------------------------------------------
      // CALCUL VECHIME
      // -----------------------------------------------
      function calcVechime(fisa) {
        if (!fisa || !fisa.data_preluare_fizica) {
          return { text: "-", color: "text-slate-400" };
        }
        const dataStart = new Date(fisa.data_preluare_fizica);
        let dataReferinta;
        if (fisa.data_finalizare) {
          dataReferinta = new Date(fisa.data_finalizare);
        } else {
          dataReferinta = new Date();
        }
        const diffTime = dataReferinta - dataStart;
        let diffZile = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        if (diffZile < 0) diffZile = 0;
        const esteDepasit = diffZile > 14;
        return {
          text: esteDepasit
            ? `${diffZile} ZILE (DEPĂȘIT)`
            : `${diffZile} ZILE (OK)`,
          color: esteDepasit ? "text-red-700" : "text-green-700",
        };
      }

      async function exportToExcel() {
        const type = document.getElementById("export-type").value;
        let dataToExport = [];

        if (type === "all") {
          const { data, error } = await _supa
            .from("fise")
            .select("*")
            .eq("is_deleted", false)
            .eq("magazin", activeUser.service)
            .order("created_at", { ascending: true });
          if (error || !data.length)
            return alert("Nu există date de exportat!");
          dataToExport = data;
        } else if (type === "current") {
          if (totalFilteredCount === 0)
            return alert("Nu există date vizibile de exportat!");
          const { data: filteredAll, error: errF } = await buildBaseQuery(false)
            .order("updated_at", { ascending: false })
            .range(0, totalFilteredCount - 1);
          if (errF || !filteredAll)
            return alert(
              "Eroare la export: " + (errF?.message || "necunoscută"),
            );
          dataToExport = filteredAll;
        } else if (type === "period") {
          const start = document.getElementById("exp-start").value;
          const end = document.getElementById("exp-end").value;
          if (!start || !end) return alert("Selectați perioada!");
          const { data, error } = await _supa
            .from("fise")
            .select("*")
            .eq("is_deleted", false)
            .eq("magazin", activeUser.service)
            .gte("created_at", start + "T00:00")
            .lte("created_at", end + "T23:59")
            .order("created_at", { ascending: true });
          if (error || !data.length)
            return alert("Nu există date de exportat!");
          dataToExport = data;
        }

        const rows = dataToExport.map((f, idx) => ({
          "Nr. Crt": idx + 1,
          "ID Fisa": f.id,
          "Data Inregistrare": f.created_at
            ? (() => {
                const parts = f.created_at.substring(0, 10).split("-");
                const time = f.created_at.substring(11, 19);
                return `${parts[2]}-${parts[1]}-${parts[0]} ${time}`;
              })()
            : "",
          Magazin: f.magazin || "",
          "Nume Client": f.nume_client,
          Telefon: f.tel_client,
          Email: f.email_client,
          Adresa: f.adresa_client,
          Județ: f.judet_client || "",
          Categorie: f.categorie,
          "Marca/Model": f.marca_model,
          VIN: f.vin_produs,
          "Nr Factura": f.nr_factura,
          "Data Factura": f.data_factura
            ? f.data_factura.split("-").reverse().join("-")
            : "",
          "Tip Garantie": f.tip_garantie,
          "Observatii Produs": f.obs_produs,
          "Reclamatie Client": f.reclamatie_client,
          Status: f.status,
        }));

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Fise Service");
        XLSX.writeFile(
          workbook,
          `Export_Geeli_${activeUser.service}_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      // -----------------------------------------------
      // MODELE PRODUSE
      // -----------------------------------------------
      const modeleCategorii = {
        "Bicicleta electrica": [
          "GF25",
          "GT25",
          "MJ1",
          "RSIII PRO",
          "T7",
          "TNT5",
          "W6",
          "ZF6",
          "Altele",
        ],
        "Tricicleta electrica": [
          "GRAPE 25 MAX",
          "OPTIMUS ULTRA",
          "E-KAMYONET SKY VAN",
          "GL35000",
          "MOBILITY",
          "RUZGAR",
          "Altele",
        ],
        "Scuter electric": [
          "MOPED ELECTRIC GEELI UTIL 2",
          "MT3 PRO X",
          "BLUES",
          "ECO RIDER MQ",
          "GREE 08",
          "REE1500",
          "SWEET",
          "Altele",
        ],
        "Cvadraciclu electric": ["ARORA S2", "ARORA S1", "CITY KUBA", "Altele"],
      };

      function updateModelOptions() {
        const catSelect = document.getElementById("p-cat");
        const catAltInput = document.getElementById("p-cat-alt");
        const modWrapper = document.getElementById("p-mod-wrapper");
        const selectie = catSelect.value;

        if (selectie === "Alta") {
          catAltInput.classList.remove("hidden");
          renderModelInput();
          return;
        } else {
          catAltInput.classList.add("hidden");
        }

        if (modeleCategorii[selectie]) {
          let optionsHtml = `<select id="p-mod-select" onchange="handleModelSelection(this)" class="w-full p-3 border-2 border-slate-200 rounded-lg text-sm font-black bg-slate-50">`;
          optionsHtml += `<option value="" disabled selected>Selectați modelul...</option>`;
          modeleCategorii[selectie].forEach((mod) => {
            optionsHtml += `<option value="${mod}">${mod}</option>`;
          });
          optionsHtml += `</select>`;
          optionsHtml += `<input type="hidden" id="p-mod" value="">`;
          modWrapper.innerHTML = optionsHtml;
        } else {
          renderModelInput();
        }
      }

      function handleModelSelection(selectElement) {
        const pModHidden = document.getElementById("p-mod");
        if (selectElement.value === "Altele") {
          renderModelInput();
        } else {
          pModHidden.value = selectElement.value;
        }
      }

      function renderModelInput() {
        const modWrapper = document.getElementById("p-mod-wrapper");
        modWrapper.innerHTML = `<input type="text" id="p-mod" placeholder="Introduceți Marcă / Model" class="w-full p-3 border-2 border-slate-200 rounded-lg font-semibold text-sm">`;
      }
    </script>
  </body>
</html>
